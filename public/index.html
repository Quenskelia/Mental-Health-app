<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health App</title>
</head>
<body>
    <main>
        <h1 id = "main-title" class ="title"> Welcome Friend! </h1>
        <div id = "naming" class="enter-name">
            <p class= "name-input"> Please enter your name</p>
            <input type="text" id="name" name="name" placeholder="Your Name">
             <button id="submit-name">Submit</button>
        </div>
        <div class="moods">
             <p class="mood-input"> How are you feeling today? </p>
            <button class="mood-buttons" id="happy">Happy</button>
            <button class="mood-buttons" id="okay">Okay</button>
            <button class="mood-buttons" id="low">Low</button>
            <button class="mood-buttons" id="stressed">Stressed</button>
        </div>
    </main>
            
    

</body>








</html>
